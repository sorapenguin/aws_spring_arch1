<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ユーザー登録')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">ユーザー登録</h1>
  </div>

  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">エラーメッセージ</div>

  <div class="card">
    <div class="card-body">
      <form th:action="@{/register}" th:object="${form}" method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label" for="username">ユーザー名</label>
          <input class="form-control" id="username" type="text" th:field="*{username}" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="email">メールアドレス</label>
          <input class="form-control" id="email" type="email" th:field="*{email}" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="password">パスワード</label>
          <input class="form-control" id="password" type="password" th:field="*{password}" required>
        </div>
        <div class="col-12 d-flex justify-content-between mt-3">
          <a class="btn btn-outline-secondary" th:href="@{/questions}">問題一覧へ戻る</a>
          <button class="btn btn-primary" type="submit">登録する</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
