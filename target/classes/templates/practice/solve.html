<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('演習')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">演習</h1>
    <a class="btn btn-outline-secondary btn-sm" th:href="@{/questions}">一覧へ戻る</a>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="text-muted small mb-2">ID: <span th:text="${question.id}">1</span></div>
      <div class="fs-5 fw-semibold" th:text="${question.statement}">statement</div>
    </div>
  </div>

  <form th:action="@{|/practice/${question.id}/answer|}" method="post">
    <div class="list-group mb-3">
      <label class="list-group-item d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="radio" name="selectedChoice" value="A" required>
        <span><span class="fw-semibold me-2">A</span><span th:text="${question.choiceA}">A</span></span>
      </label>
      <label class="list-group-item d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="radio" name="selectedChoice" value="B" required>
        <span><span class="fw-semibold me-2">B</span><span th:text="${question.choiceB}">B</span></span>
      </label>
      <label class="list-group-item d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="radio" name="selectedChoice" value="C" required>
        <span><span class="fw-semibold me-2">C</span><span th:text="${question.choiceC}">C</span></span>
      </label>
      <label class="list-group-item d-flex gap-2">
        <input class="form-check-input flex-shrink-0" type="radio" name="selectedChoice" value="D" required>
        <span><span class="fw-semibold me-2">D</span><span th:text="${question.choiceD}">D</span></span>
      </label>
    </div>

    <button class="btn btn-success" type="submit">解答する</button>
  </form>
</div>
</body>
</html>
