<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('問題一覧')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">問題一覧</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary btn-sm" th:href="@{/practice/random/start}">
        ランダム10問を解く
      </a>
    </div>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
        <tr>
          <th style="width: 90px;">ID</th>
          <th>問題文</th>
          <th style="width: 140px;"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="q : ${questions}">
          <td class="text-muted" th:text="${q.id}">1</td>
          <td th:text="${q.statement}">statement</td>
          <td class="text-end">
            <a class="btn btn-sm btn-primary" th:href="@{|/practice/${q.id}|}">解く</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-3 text-muted small">
    「解く」で単問演習できます。<br/>
    「ランダム10問を解く」でランダムセットをスタートします。
  </div>
</div>
</body>
</html>
