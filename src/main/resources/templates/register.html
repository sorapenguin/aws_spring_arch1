<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ユーザー登録')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h2 class="text-center fw-bold mb-4">新規ユーザー登録</h2>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/register}" th:object="${form}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label">ユーザー名</label>
                            <input type="text" th:field="*{username}" class="form-control" th:errorclass="is-invalid" placeholder="guest">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">メールアドレス</label>
                            <input type="email" th:field="*{email}" class="form-control" th:errorclass="is-invalid" placeholder="guest@example.com">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">パスワード</label>
                            <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid" placeholder="8文字以上">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">アカウント作成</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a th:href="@{/login}" class="small text-decoration-none">既にアカウントをお持ちの方はこちら</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
