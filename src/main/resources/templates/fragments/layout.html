<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title}">Java学習システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body th:fragment="body(content)">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">
      <i class="bi bi-code-slash me-2"></i>Practice
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="navbar-nav me-auto">
        <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door"></i> ホーム</a>
        <!-- <a class="nav-link" th:href="@{/questions}"><i class="bi bi-list-ul"></i> 問題一覧</a> -->
        </div>
      
      <div class="navbar-nav ms-auto">
        
        <div sec:authorize="isAnonymous()" class="d-flex align-items-center">
          <a class="nav-link" th:href="@{/register}">ユーザー登録</a>
          <a class="btn btn-outline-light btn-sm ms-2" th:href="@{/login}">
             <i class="bi bi-box-arrow-in-right"></i> ログイン
          </a>
        </div>

        <div sec:authorize="isAuthenticated()" class="navbar-nav ms-auto d-flex align-items-center gap-3">
    <span class="text-light">
        <i class="bi bi-person-circle me-1"></i>
        <span class="fw-bold" sec:authentication="name">ユーザー名</span> さん ログイン中
    </span>

    <a class="nav-link p-0" th:href="@{/profile}">
        <i class="bi bi-graph-up me-1"></i>進捗
    </a>

    <form th:action="@{/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right"></i> ログアウト
        </button>
    </form>
</div>

      </div>
    </div>
  </div>
</nav>

<main class="container my-5" th:replace="${content}">Content</main>

<footer class="py-3 my-4 border-top">
    <p class="text-center text-muted">© 2026 Java学習システム</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
