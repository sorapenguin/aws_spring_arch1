<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('登録完了')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">登録完了</h1>
  </div>

  <div class="alert alert-success">
    <div class="fw-bold">ユーザー登録が完了しました。</div>
    <div class="mt-1">
      ようこそ、<span class="fw-semibold" th:text="${username}">username</span> さん！
    </div>
  </div>

  <div class="d-flex gap-2">
    <a class="btn btn-primary" th:href="@{/questions}">問題演習を始める</a>
    <a class="btn btn-outline-secondary" th:href="@{/register}">別のユーザーを登録</a>
  </div>
</div>
</body>
</html>
