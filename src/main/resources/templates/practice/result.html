<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('結果')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
<div class="d-flex align-items-center justify-content-between mb-3">
  <h1 class="h3 mb-0">
    結果 
    <small class="text-muted fs-6" th:if="${totalNum != null}">
      （全 <span th:text="${totalNum}">1</span> 問中 <span th:text="${currentNum}">1</span> 問目）
    </small>
  </h1>
  <a class="btn btn-outline-secondary btn-sm" th:href="@{/questions}">一覧へ</a>
</div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="text-muted small mb-2">ID: <span th:text="${question.id}">1</span></div>
      <div class="fs-5 fw-semibold" th:text="${question.statement}">statement</div>
    </div>
  </div>

  <div class="alert" th:classappend="${correct} ? ' alert-success' : ' alert-danger'">
    <div class="fw-bold" th:text="${correct} ? '正解！' : '不正解…'">正解/不正解</div>
    <div class="small mt-1">
      あなたの解答:
      <span class="fw-semibold" th:text="${selectedChoice}">A</span>
      ／ 正解:
      <span class="fw-semibold" th:text="${question.correctChoice}">B</span>
      <span class="ms-2 text-muted" th:if="${answeredAt != null}">
        （解答日時:
        <span th:text="${#temporals.format(answeredAt, 'yyyy/MM/dd HH:mm:ss')}">2026/03/17 12:34:56</span>
        ）
      </span>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header">解説</div>
    <div class="card-body">
      <div th:text="${question.explanation}">explanation</div>
    </div>
  </div>


  <div class="d-flex flex-column gap-3">
    
    <div th:if="${!isLast}" class="d-flex gap-2">
      <a class="btn btn-primary" th:href="@{/practice/random/question}">次の問題へ</a>
      <a class="btn btn-outline-secondary" th:href="@{|/practice/${question.id}|}">同じ問題を解き直す</a>
    </div>

    <div th:if="${isLast}" class="alert alert-info text-center shadow-sm">
      <h4 class="alert-heading fw-bold">✨ 全問終了！</h4>
      <p class="mb-3">今回の演習はすべて完了しました。お疲れ様でした！</p>
      <hr>
      <div class="d-flex justify-content-center gap-2">
        <a class="btn btn-success px-4" th:href="@{/}">トップページへ</a>
        <a class="btn btn-outline-primary px-4" th:href="@{/questions}">問題一覧へ</a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
</div>
</body>
</html>
