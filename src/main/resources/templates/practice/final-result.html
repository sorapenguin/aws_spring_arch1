<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('演習結果')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
    <div class="container py-5 text-center">
        <div class="display-1 mb-4">🎉</div>
        <h1 class="display-5 fw-bold mb-4">演習お疲れ様でした！</h1>
        
        <div class="card shadow-sm mx-auto mb-5" style="max-width: 500px;">
            <div class="card-body py-5">
                <h2 class="h4 text-muted mb-3">すべての問題を解き終えました</h2>
                <p class="fs-5">今回の学習記録はデータベースに保存されています。</p>
            </div>
        </div>

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a th:href="@{/}" class="btn btn-primary btn-lg px-4 gap-3">トップページへ</a>
            <a th:href="@{/questions}" class="btn btn-outline-secondary btn-lg px-4">問題一覧を見る</a>
        </div>
    </div>
</div>
</body>
</html>
