<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ログイン')}"></head>
<body th:replace="~{fragments/layout :: body(~{::content})}">
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h2 class="text-center fw-bold mb-4">ログイン</h2>

                    <div th:if="${param.error}" class="alert alert-danger small">
                        ユーザー名またはパスワードが正しくありません。
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info small">
                        ログアウトしました。
                    </div>

                    <form th:action="@{/login}" method="post" id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label small">ユーザー名</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label small">パスワード</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">ログイン</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted small">ポートフォリオ閲覧用（入力不要）</p>
                        <button type="button" class="btn btn-outline-success w-100 fw-bold" onclick="testLogin()">
                            <i class="bi bi-person-check-fill me-1"></i> テストユーザーでログイン
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <a th:href="@{/register}" class="small text-decoration-none">新規ユーザー登録はこちら</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function testLogin() {
            // 自動で値を入力して送信
            document.getElementById('username').value = 'guest';
            document.getElementById('password').value = 'password';
            document.getElementById('loginForm').submit();
        }
    </script>
</div>
</body>
</html>
